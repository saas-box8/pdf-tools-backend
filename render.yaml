# render.yaml — deploy all 13 backends on Render free plan
# Push this entire folder to GitHub, then: Render Dashboard → New → Blueprint

services:
  # ── 1. PDF → JPG (photo.py) ───────────────────────────────────────────────
  - type: web
    name: pdf-to-jpg
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn photo:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free

